<svg class="banner" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
                        <!-- Vintage beige background -->
                        <rect width="1200" height="300" fill="#6da6aa"/>
                        
                        <!-- Subtle texture -->
                        <defs>
                            <pattern id="texture" width="4" height="4" patternUnits="userSpaceOnUse">
                                <rect width="4" height="4" fill="#6da6aa"/>
                                <circle cx="2" cy="2" r="0.5" fill="#e8e0d5" opacity="0.3"/>
                            </pattern>
                        </defs>
                        <rect width="1200" height="300" fill="url(#texture)"/>

                        <!-- Computer window -->
                        <rect x="85" y="50" width="160" height="140" fill="#c0c0c0"/>
                        <rect x="86" y="51" width="158" height="19" fill="#01007c"/>
                        <rect x="85" y="50" width="1" height="140" fill="#efefef"/>
                        <rect x="85" y="50" width="160" height="1" fill="#efefef"/>
                        <rect x="245" y="50" width="1" height="140" fill="#222423"/>
                        <rect x="85" y="190" width="161" height="1" fill="#222423"/>
                        <text x="92" y="63" font-family="'MS Sans Serif', sans-serif" font-size="10" fill="#ffffff">treeignore.txt</text>
                        <rect x="230" y="55" width="10" height="10" fill="#c0c0c0"/>
                        <text x="232" y="64" font-family="'MS Sans Serif', sans-serif" font-size="10" fill="#000000">X</text>
                        
                        <!-- Window content -->
                        <text x="93" y="82" font-family="'Courier New', monospace" font-size="9" fill="#000000"># Ignore patterns</text>
                        <text x="93" y="94" font-family="'Courier New', monospace" font-size="9" fill="#000000">*.log</text>
                        <text x="93" y="106" font-family="'Courier New', monospace" font-size="9" fill="#000000">node_modules/</text>
                        <text x="93" y="118" font-family="'Courier New', monospace" font-size="9" fill="#000000">build/</text>
                        <text x="93" y="130" font-family="'Courier New', monospace" font-size="9" fill="#000000">.env</text>
                        <text x="93" y="142" font-family="'Courier New', monospace" font-size="9" fill="#000000">dist/</text>
                        

                        <!-- Text -->
                        <text x="330" y="105" font-family="'Courier New', monospace" font-size="68" font-weight="900" fill="#01007c" letter-spacing="-2">.treeignore</text>
                        <text x="378" y="160" font-family="'Courier New', monospace" font-size="23" fill="#bec6c9" letter-spacing="1" font-weight="bold">File Format Specification</text>

                        <!-- Accent bar -->
                        <rect x="375" y="175" width="378" height="4" fill="#01007c"/>
                    </svg>